services:

  postgres:
    container_name: 5142026_postgres_container
    image: postgres:17.5
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      PGDATA: /data/postgres
      TZ: Europe/Moscow
    volumes:
       - 5142026_postgres:/data/postgres
    networks:
      - 5142026_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    container_name: 5142026_backend_container
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_TITLE: ${APP_TITLE:-Example Server}
      CORS: ${CORS:-http://localhost:5173,http://127.0.0.1:5173}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-app}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      TZ: Europe/Moscow
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - 5142026_network
    restart: unless-stopped

networks:
  5142026_network:
    driver: bridge

volumes:
    5142026_postgres:
